<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>인기글 - 마음우체통</title>
    <meta name="description" content="많은 공감을 받은 인기 고민들을 확인해보세요.">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="인기글 - 마음우체통">
    <meta property="og:description" content="많은 공감을 받은 인기 고민들을 확인해보세요.">
    <meta property="og:url" content="https://allnewstartday.com/popular">
    <meta property="og:image" content="https://i.postimg.cc/pXjDWG5z/og-image.jpg">
    <meta property="og:site_name" content="마음우체통">

    <!-- 파비콘 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📮</text></svg>">

    <!-- 구글 애드센스 -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7162051930516598" crossorigin="anonymous"></script>
    <!-- 네이버 웹마스터 -->
    <meta name="naver-site-verification" content="4362a3747096e4d72fb71efdf8c0452ebbc8aeca" />
    <!-- 카카오 애드핏 -->
    <script async src="https://t1.daumcdn.net/kas/static/ba.min.js"></script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
</head>
<body>
    <!-- 상단 광고 (구글 애드센스) -->
    <div class="ad-container ad-top">
        <div class="ad-slot">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7162051930516598" data-ad-slot="AUTO" data-ad-format="auto" data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
    </div>

    <div class="container">
        <div class="page-title">
            <h1>🔥 인기글</h1>
            <p>많은 공감을 받은 고민들</p>
        </div>

        <!-- 인기글 목록 -->
        <div id="popular-list">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <!-- 하단 광고 (카카오 애드핏) -->
    <div class="ad-container ad-bottom">
        <div class="ad-slot">
            <ins class="kakao_ad_area" style="display:none;" data-ad-unit="DAN-tTbs6kroYj3SnOoV" data-ad-width="320" data-ad-height="50"></ins>
        </div>
    </div>

    <!-- 푸터 -->
    <footer class="footer">
        <div class="footer-inner">
            <div class="footer-logo">📮 마음우체통</div>
            <p class="footer-business">비즈니스 문의: <a href="mailto:Lovelyday2@kakao.com">Lovelyday2@kakao.com</a></p>
            <p class="footer-copyright">© 2024 마음우체통. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/supabase-client.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/header.js"></script>
    <script>
        // 인기글 카드 렌더링 (순위 포함)
        function renderPopularCard(confession, rank) {
            const card = document.createElement('div');
            card.className = 'card confession-card';
            card.onclick = () => goTo(`/concern/${confession.id}`);

            const rankBadge = rank <= 3 ? ['🥇', '🥈', '🥉'][rank - 1] : `#${rank}`;
            const rankStyle = rank <= 3 ? 'font-size: 1.5rem;' : 'font-size: 1rem; color: var(--text-muted);';

            card.innerHTML = `
                <div style="display: flex; gap: var(--space-md); align-items: flex-start;">
                    <div style="${rankStyle} font-weight: bold; min-width: 40px; text-align: center;">
                        ${rankBadge}
                    </div>
                    <div style="flex: 1;">
                        <div class="confession-header" style="margin-bottom: var(--space-sm);">
                            <span class="confession-emoji">${confession.emoji || '💌'}</span>
                            <span class="confession-category ${confession.category}">
                                ${getCategoryLabel(confession.category)}
                            </span>
                            <span class="confession-time">${formatTime(confession.created_at)}</span>
                        </div>

                        <div class="confession-content">${truncate(confession.content, 120)}</div>

                        <div class="confession-footer">
                            <span class="confession-stat" style="color: var(--accent);">❤️ ${confession.like_count}</span>
                            <span class="confession-stat">💬 ${confession.reply_count}</span>
                            <span class="confession-stat">👁️ ${confession.view_count}</span>
                        </div>
                    </div>
                </div>
            `;

            return card;
        }

        // 인기글 로드
        async function loadPopular() {
            const container = document.getElementById('popular-list');

            try {
                const result = await confessionAPI.list({
                    sort: 'popular',
                    per_page: 30,
                });

                if (result.data.length === 0) {
                    showEmpty(container, '🔥', '아직 인기글이 없어요', '고민에 공감을 눌러주세요!');
                    return;
                }

                container.innerHTML = '';
                result.data.forEach((confession, index) => {
                    container.appendChild(renderPopularCard(confession, index + 1));
                });
            } catch (error) {
                showToast(error.message);
            }
        }

        // 초기 로드
        loadPopular();
    </script>
</body>
</html>
