<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>내 우체통 - 마음우체통</title>
    <meta name="description" content="내가 쓴 고민과 받은 답장을 확인하세요.">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="내 우체통 - 마음우체통">
    <meta property="og:description" content="내가 쓴 고민과 받은 답장을 확인하세요.">
    <meta property="og:url" content="https://allnewstartday.com/my">
    <meta property="og:image" content="https://i.postimg.cc/pXjDWG5z/og-image.jpg">
    <meta property="og:site_name" content="마음우체통">

    <!-- 파비콘 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📮</text></svg>">

    <!-- 구글 애드센스 -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7162051930516598" crossorigin="anonymous"></script>
    <!-- 네이버 웹마스터 -->
    <meta name="naver-site-verification" content="4362a3747096e4d72fb71efdf8c0452ebbc8aeca" />
    <!-- 카카오 애드핏 -->
    <script async src="https://t1.daumcdn.net/kas/static/ba.min.js"></script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
</head>
<body>
    <!-- 상단 광고 (구글 애드센스) -->
    <div class="ad-container ad-top">
        <div class="ad-slot">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7162051930516598" data-ad-slot="AUTO" data-ad-format="auto" data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
    </div>

    <div class="container">
        <div class="page-title">
            <h1>📭 내 우체통</h1>
            <p>내가 쓴 고민과 답장을 확인하세요</p>
        </div>

        <!-- 탭 -->
        <div class="tabs">
            <button class="tab active" data-tab="confessions">내 고민</button>
            <button class="tab" data-tab="replies">내 답장</button>
        </div>

        <!-- 내 고민 -->
        <div id="confessions-tab" class="tab-content">
            <div id="my-confessions-list">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <!-- 내 답장 -->
        <div id="replies-tab" class="tab-content" style="display: none;">
            <div id="my-replies-list">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 하단 광고 (카카오 애드핏) -->
    <div class="ad-container ad-bottom">
        <div class="ad-slot">
            <ins class="kakao_ad_area" style="display:none;" data-ad-unit="DAN-tTbs6kroYj3SnOoV" data-ad-width="320" data-ad-height="50"></ins>
        </div>
    </div>

    <!-- 푸터 -->
    <footer class="footer">
        <div class="footer-inner">
            <div class="footer-logo">📮 마음우체통</div>
            <p class="footer-business">비즈니스 문의: <a href="mailto:Lovelyday2@kakao.com">Lovelyday2@kakao.com</a></p>
            <p class="footer-copyright">© 2024 마음우체통. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/supabase-client.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/header.js"></script>
    <script>
        // 탭 전환
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                const tabName = tab.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.style.display = 'none';
                });
                document.getElementById(`${tabName}-tab`).style.display = 'block';
            });
        });

        // 내 고민 렌더링
        function renderMyConfessions(confessions) {
            const container = document.getElementById('my-confessions-list');

            if (confessions.length === 0) {
                showEmpty(container, '📝', '아직 작성한 고민이 없어요', '첫 번째 고민을 작성해보세요!');
                return;
            }

            container.innerHTML = confessions.map(confession => `
                <div class="card confession-card" onclick="goTo('/concern/${confession.id}')">
                    <div class="confession-header">
                        <span class="confession-emoji">${confession.emoji || '💌'}</span>
                        <span class="confession-category ${confession.category}">
                            ${getCategoryLabel(confession.category)}
                        </span>
                        <span class="confession-time">${formatTime(confession.created_at)}</span>
                    </div>

                    ${confession.title ? `<div style="font-weight: 600; margin-bottom: var(--space-sm);">${confession.title}</div>` : ''}

                    <div class="confession-content">${truncate(confession.content, 100)}</div>

                    <div class="confession-footer">
                        <span class="confession-stat">💬 ${confession.reply_count}</span>
                        <span class="confession-stat">❤️ ${confession.like_count}</span>
                        ${confession.new_replies > 0 ? `
                            <span style="margin-left: auto; background: var(--primary); color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem;">
                                새 답장 ${confession.new_replies}
                            </span>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        // 내 답장 렌더링
        function renderMyReplies(replies) {
            const container = document.getElementById('my-replies-list');

            if (replies.length === 0) {
                showEmpty(container, '✍️', '아직 작성한 답장이 없어요', '누군가의 고민에 답장해보세요!');
                return;
            }

            container.innerHTML = replies.map(reply => `
                <div class="card" onclick="goTo('/concern/${reply.confession_id}')" style="cursor: pointer;">
                    <div style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: var(--space-sm);">
                        ${reply.emoji || '💌'} 에게 보낸 답장
                    </div>

                    <div style="background: var(--bg-hover); padding: var(--space-sm) var(--space-md); border-radius: 8px; font-size: 0.9rem; color: var(--text-secondary); margin-bottom: var(--space-md);">
                        ${truncate(reply.confession_content, 50)}
                    </div>

                    <div style="font-size: 0.95rem; line-height: 1.6;">
                        ${truncate(reply.content, 100)}
                    </div>

                    <div class="confession-footer" style="margin-top: var(--space-md);">
                        <span class="confession-stat">❤️ ${reply.like_count}</span>
                        <span class="confession-time" style="margin-left: auto;">${formatTime(reply.created_at)}</span>
                    </div>
                </div>
            `).join('');
        }

        // 데이터 로드
        async function loadData() {
            try {
                const [confessionsResult, repliesResult] = await Promise.all([
                    myAPI.confessions(),
                    myAPI.replies(),
                ]);

                renderMyConfessions(confessionsResult.data);
                renderMyReplies(repliesResult.data);
            } catch (error) {
                showToast(error.message);
            }
        }

        // 초기 로드
        loadData();
    </script>
</body>
</html>
