    <style>
        .test-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--space-md);
        }

        @media (min-width: 480px) {
            .test-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .test-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: var(--space-lg);
            box-shadow: 0 2px 8px var(--shadow);
            cursor: pointer;
            transition: all var(--duration) var(--ease-out);
            position: relative;
            overflow: hidden;
        }

        .test-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px var(--shadow);
        }

        .test-card:active {
            transform: scale(0.98);
        }

        .test-card .icon {
            font-size: 2.5rem;
            margin-bottom: var(--space-md);
        }

        .test-card h3 {
            font-size: 1.1rem;
            margin-bottom: var(--space-xs);
            color: var(--text-primary);
        }

        .test-card p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .test-card .badge {
            position: absolute;
            top: var(--space-md);
            right: var(--space-md);
            background: var(--primary);
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .test-card .badge.new {
            background: var(--accent);
        }

        .test-card .time {
            display: inline-block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: var(--space-sm);
        }

        /* 테스트 실행 화면 */
        #test-container {
            display: none;
        }

        .test-question {
            text-align: center;
            padding: var(--space-xl) var(--space-md);
        }

        .test-progress {
            background: var(--border);
            height: 4px;
            border-radius: 2px;
            margin-bottom: var(--space-xl);
            overflow: hidden;
        }

        .test-progress-bar {
            background: var(--primary);
            height: 100%;
            transition: width 0.3s ease;
        }

        .test-q-number {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: var(--space-md);
        }

        .test-q-text {
            font-size: 1.3rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: var(--space-xl);
            color: var(--text-primary);
        }

        .test-options {
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }

        .test-option {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: var(--space-lg);
            font-size: 1rem;
            text-align: center;
            transition: all var(--duration);
            min-height: var(--touch-min);
        }

        .test-option:hover {
            border-color: var(--primary);
            background: var(--bg-hover);
        }

        .test-option:active {
            transform: scale(0.98);
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* 결과 화면 */
        .test-result {
            text-align: center;
            padding: var(--space-xl);
        }

        .result-type {
            font-size: 4rem;
            margin-bottom: var(--space-md);
        }

        .result-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: var(--space-sm);
        }

        .result-subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: var(--space-lg);
        }

        .result-desc {
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--text-primary);
            text-align: left;
            background: var(--bg-hover);
            padding: var(--space-lg);
            border-radius: 12px;
            margin-bottom: var(--space-lg);
        }

        .result-actions {
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }

        @media (min-width: 480px) {
            .result-actions {
                flex-direction: row;
                justify-content: center;
            }
        }
    </style>
</head>

                questions: [

                ],
                results: {
                    'AAAAA': { type: '🔴', title: '위험 신호!', sub: '스트레스 레벨 MAX', desc: '지금 당장 휴식이 필요해요! 잠시 멈추고 자신을 돌봐주세요. 필요하면 전문가와 상담도 고려해보세요.' },
                    'BBBBB': { type: '🟢', title: '건강해요!', sub: '스트레스 관리 잘함', desc: '스트레스 관리를 잘 하고 있어요! 지금처럼 자기관리 잘 해주세요.' },
                    'default': { type: '🟡', title: '주의 필요', sub: '보통 수준의 스트레스', desc: '어느 정도 스트레스가 있어요. 취미생활이나 운동으로 풀어보세요!' }

                    { q: '친구에게 나는 어떤 존재?', a: ['분위기 메이커', '든든한 조언자'] },

                ],

                    'AAAA': { type: '🔴', title: '레드', sub: '열정의 빨강', desc: '에너지가 넘치고 적극적인 당신! 어디서든 주목받는 존재감을 가지고 있어요.' },
                    'BBBB': { type: '🔵', title: '블루', sub: '신뢰의 파랑', desc: '차분하고 믿음직한 당신! 깊은 생각과 안정감으로 주변에 편안함을 줘요.' },
                    'AABB': { type: '💜', title: '퍼플', sub: '창의의 보라', desc: '감성적이면서도 독특한 당신! 창의적인 아이디어가 넘치는 아티스트 기질이에요.' },
                    'default': { type: '💚', title: '그린', sub: '조화의 초록', desc: '균형잡힌 성격의 당신! 자연스럽게 사람들을 이어주는 조화로운 존재예요.' }
                }
            },
            'slow-aging': {
                title: '저속노화 건강나이 테스트',
                icon: '🧬',
                desc: '나의 실제 건강나이는?',
                time: '4분',
                badge: 'NEW',
                questions: [
                    { q: '하루에 물을 얼마나 마시나요?', a: ['2L 이상', '1L 미만'] },
                    { q: '주 3회 이상 운동하나요?', a: ['네, 꾸준히 해요', '거의 안 해요'] },
                    { q: '수면 시간은?', a: ['7-8시간 충분히', '5시간 이하'] },
                    { q: '과일/채소 섭취는?', a: ['매일 먹어요', '가끔 먹어요'] },
                    { q: '스트레스 관리는?', a: ['나만의 방법이 있어요', '방법이 없어요'] },
                ],
                results: {
                    'AAAAA': { type: '👼', title: '-10세', sub: '건강나이 최고!', desc: '실제 나이보다 10살 젊은 몸! 지금 생활습관을 유지하면 오래오래 건강해요.' },
                    'BBBBB': { type: '👴', title: '+10세', sub: '관리가 필요해요', desc: '건강 관리에 신경 쓸 때예요! 작은 습관부터 바꿔보세요.' },
                    'default': { type: '😊', title: '적정', sub: '건강나이 양호', desc: '평균적인 건강 상태! 조금만 더 신경 쓰면 더 젊어질 수 있어요.' }
                }
            }
        };

        let currentTest = null;
        let currentTestId = null;
        let currentQuestion = 0;
        let answers = [];

        // 테스트 목록 렌더링
        function renderTestList() {
            const grid = document.getElementById('tests-grid');
            grid.innerHTML = Object.entries(TESTS).map(([id, test]) => `
                <div class="test-card" onclick="startTest('${id}')">
                    ${test.badge ? `<span class="badge ${test.badge === 'NEW' ? 'new' : ''}">${test.badge}</span>` : ''}
                    <div class="icon">${test.icon}</div>
                    <h3>${test.title}</h3>
                    <p>${test.desc}</p>
                    <span class="time">⏱️ ${test.time}</span>
                </div>
            `).join('');
        }

        // 테스트 시작
        function startTest(testId) {
            currentTest = TESTS[testId];
            currentTestId = testId;
            currentQuestion = 0;
            answers = [];

            document.getElementById('test-list').style.display = 'none';
            document.getElementById('test-container').style.display = 'block';
            document.getElementById('result-container').style.display = 'none';

            renderQuestion();
        }

        // 질문 렌더링
        function renderQuestion() {
            const q = currentTest.questions[currentQuestion];
            const total = currentTest.questions.length;
            const progress = ((currentQuestion) / total) * 100;

            document.getElementById('progress-bar').style.width = progress + '%';

            document.getElementById('question-area').innerHTML = `
                <div class="test-q-number">Q${currentQuestion + 1} / ${total}</div>
                <div class="test-q-text">${q.q}</div>
                <div class="test-options">
                    ${q.a.map((answer, i) => `
                        <button class="test-option" onclick="selectAnswer('${i === 0 ? 'A' : 'B'}')">
                            ${answer}
                        </button>
                    `).join('')}
                </div>
            `;
        }

        // 답변 선택
        function selectAnswer(answer) {
            answers.push(answer);

            if (currentQuestion < currentTest.questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                showResult();
            }
        }

        // 결과 표시
        function showResult() {
            const answerKey = answers.join('');
            const result = currentTest.results[answerKey] || currentTest.results['default'];

            // 사용 통계 기록 (common.js의 trackContentUsage 사용)
            trackContentUsage('test', currentTestId, currentTest.title);

            document.getElementById('test-container').style.display = 'none';
            document.getElementById('result-container').style.display = 'block';

            document.getElementById('result-area').innerHTML = `
                <div class="result-type">${result.type}</div>
                <div class="result-title">${result.title}</div>
                <div class="result-subtitle">${result.sub}</div>
                <div class="result-desc">${result.desc}</div>
                <div class="result-actions">
                    <button class="btn btn-primary" onclick="location.reload()">
                        🔄 다시 하기
                    </button>
                    <button class="btn btn-secondary" onclick="goTo('/play')">
                        🎮 다른 테스트
                    </button>
                    <button class="btn btn-ghost" onclick="shareResult()">
                        📤 공유하기
                    </button>
                </div>
            `;
        }

        // 공유
        function shareResult() {
            if (navigator.share) {
                navigator.share({
                    title: currentTest.title + ' 결과',
                    text: '나의 결과를 확인해보세요!',
                    url: location.href
                });
            } else {
                showToast('링크가 복사되었습니다!');
            }
        }

        // URL 파라미터로 직접 테스트 시작
        const urlParams = new URLSearchParams(location.search);
        const testParam = urlParams.get('test');

        if (testParam && TESTS[testParam]) {
            startTest(testParam);
        } else {
            renderTestList();
        }
    </script>
</body>
</html>
